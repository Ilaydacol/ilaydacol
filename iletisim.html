            <p>Benimle iletişime geçmek için lütfen aşağıdaki alanları eksiksiz doldurunuz.</p>
            
            <form action="#" method="post">
                <label for="name">Adınız Soyadınız:</label>
                <input type="text" id="name" name="name" required placeholder="Örn: İlayda Çöl">

                <label for="email">E-Posta Adresiniz:</label>
                <input type="email" id="email" name="email" required placeholder="name@example.com">

                <label for="message">Mesajınız:</label>
                <textarea id="message" name="message" rows="6" required placeholder="Mesajınızı buraya yazabilirsiniz."></textarea>

                <button type="submit">Mesajı Gönder</button>
            </form>
